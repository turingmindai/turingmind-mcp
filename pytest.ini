[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = src
addopts = 
    -v
    --strict-markers
    --tb=short
asyncio_mode = auto
markers =
    tier_a: Tier A signal quality tests
    tier_b: Tier B funnel capture tests
    tier_c: Tier C reconcile extension tests
    tier_d: Tier D durability and cloud sync tests
    tier_e2e: End-to-end memory funnel tests
    meta: Catalog and harness integrity tests
    branch: Phase 4.1 branch git context capture tests
    branch_spec: SPEC-BR extracted spec conformance tests
    branch_lifecycle: Phase 4.3 merge promotion lifecycle tests
    branch_sync: Phase 4.5 cloud sync branch filter tests
    gate_2: Live plugin/API smoke (requires :8477)
