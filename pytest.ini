[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
pythonpath = src
addopts = 
    -v
    --strict-markers
    --tb=short
asyncio_mode = auto
markers =
    tier_a: Tier A signal quality tests
    tier_b: Tier B funnel capture tests
    tier_c: Tier C reconcile extension tests
    tier_d: Tier D durability and cloud sync tests
    tier_e2e: End-to-end memory funnel tests
    postgres_live: Requires POSTGRES_URI environment variable
    meta: Catalog and harness integrity tests
