version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: turingmind-postgres
    environment:
      POSTGRES_USER: turingmind
      POSTGRES_PASSWORD: turingmind_cloud_secret
      POSTGRES_DB: turingmind_cloud
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
